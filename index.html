<head>

    <meta name="theme-color" id="status-bar-color" content="#f8fafc">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GRIDLABS PROD. - INVOICING</title>

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    screens: { 'xs': '380px' },
                    fontFamily: {
                        'sans': ['Quantico', 'sans-serif'],
                        'signature': ['Dancing Script', 'cursive']
                    },
                    animation: {
                        'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'float': 'float 6s ease-in-out infinite',
                        'float-delayed': 'float 6s ease-in-out 3s infinite',
                        'fade-in': 'fadeIn 0.8s ease-out forwards',
                        'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'confetti-rain': 'confettiRain 2.5s ease-out forwards',
                        'shake': 'shake 0.4s ease-in-out'
                    },
                    keyframes: {
                        slideUp: { '0%': { transform: 'translateY(100%)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
                        float: { '0%, 100%': { transform: 'translateY(0px)' }, '50%': { transform: 'translateY(-20px)' } },
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        confettiRain: {
                            '0%': { transform: 'translateY(-10vh) rotate(0deg)', opacity: 1 },
                            '100%': { transform: 'translateY(100vh) rotate(720deg)', opacity: 0 }
                        },
                        shake: {
                            '0%, 100%': { transform: 'translateX(0)' },
                            '20%, 60%': { transform: 'translateX(-5px)' },
                            '40%, 80%': { transform: 'translateX(5px)' }
                        }
                    }
                }
            }
        }
        if (!localStorage.getItem('inv_theme')) localStorage.setItem('inv_theme', 'light');
        if (localStorage.getItem('inv_theme') === 'dark') {
            document.documentElement.classList.add('dark');
            document.addEventListener('DOMContentLoaded', () => {
                const statusBar = document.getElementById('status-bar-color');
                if (statusBar) statusBar.setAttribute("content", "#0f172a");
            });
        }

        // Security & UX Rules Setup
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => { if (e.key.match(/^F([1-9]|1[0-2])$/)) { e.preventDefault(); } });
        document.addEventListener('wheel', e => { if (e.ctrlKey) { e.preventDefault(); } }, { passive: false });
        document.addEventListener('touchstart', e => { if (e.touches.length > 1) { e.preventDefault(); } }, { passive: false });
    </script>

    <style>
        :root { --safe-bottom: env(safe-area-inset-bottom, 0px); --brand-color: #6a1b9a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; max-width: 100%; overflow-x: hidden; overscroll-behavior-x: none; }
        body { font-family: 'Quantico', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f8fafc; touch-action: manipulation; -webkit-user-select: none; user-select: none; text-transform: uppercase; }
        input, textarea, select { -webkit-user-select: auto; user-select: auto; }
        
        .dark body { background-color: #0f172a; }
        body * { transition: background-color 0.25s ease, border-color 0.25s ease, color 0.25s ease; }
        button, h1, h2, h3, h4, h5, h6 { text-transform: uppercase !important; }

        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid #e2e8f0; border-radius: 5px; }
        .dark .glass-card { background: rgba(30, 41, 59, 0.85); border-color: #334155; }
        .app-container { height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; width: 100%; max-width: 100%; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .field-input { padding: 12px 14px; border: 1px solid #cbd5e1; outline: none; border-radius: 5px; font-size: 14px; width: 100%; background: #ffffff; box-shadow: 0 1px 2px rgba(0,0,0,0.05); text-transform: uppercase; }
        .field-input:focus { border-color: #6a1b9a; box-shadow: 0 0 0 2px rgba(106,27,154,0.1); }
        .dark .field-input { border-color: #334155; background: #1e293b; color: #f1f5f9; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .dark .field-input:focus { border-color: #a855f7; box-shadow: 0 0 0 2px rgba(168,85,247,0.1); }

        .btn-primary { padding: 12px 16px; font-weight: 700; border-radius: 5px; font-size: 14px; transition: all 0.2s; }
        .btn-primary:active { transform: translateY(2px); }
        .stat-card { padding: 12px; border: 1px solid #e2e8f0; border-radius: 5px; }
        .dark .stat-card { border-color: #334155; }

        #main-content { padding: 10px; padding-bottom: 80px; width: 100%; overflow-x: hidden; }
        #bottom-nav { padding-bottom: calc(var(--safe-bottom) + 4px); border-top: 1px solid #e2e8f0; height: 60px; width: 100%; }
        .dark #bottom-nav { border-top-color: #334155; }

        @keyframes shimmerAnim { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .shimmer-box { background: linear-gradient(90deg, #e2e8f0 25%, #cbd5e1 50%, #e2e8f0 75%); background-size: 200% 100%; animation: shimmerAnim 1.5s infinite linear; border-radius: 5px; }
        .dark .shimmer-box { background: linear-gradient(90deg, #334155 25%, #475569 50%, #334155 75%); background-size: 200% 100%; }

        .bottom-sheet-overlay { transition: opacity 0.3s ease; }
        .bottom-sheet-content { transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); border-radius: 5px 5px 0 0; }
        .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 20px); }

        /* GRIDLABS INVOICE STYLES */
        .invoice-wrapper { width: 100%; display: flex; justify-content: center; position: relative; overflow: hidden; }
        .invoice-card { 
            width: 1000px; 
            min-height: 1123px; 
            flex-shrink: 0; 
            background: white !important; 
            color: #0f172a !important; 
            padding: 60px; 
            box-sizing: border-box; 
            box-shadow: 0 0 20px rgba(0,0,0,0.1); 
            border: 1px solid #e2e8f0; 
            transform-origin: top center; 
            margin: 0 auto; 
            display: flex;
            flex-direction: column;
            text-transform: uppercase;
        }
        .invoice-card * { transition: none !important; }
        
        .table-custom { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .table-custom th { text-align: left; background: #f8fafc !important; border-bottom: 2px solid #1e293b !important; padding: 12px; font-size: 13px; color: #1e293b !important; }
        .table-custom td { padding: 24px 12px; border-bottom: 1px solid #f1f5f9 !important; font-size: 15px; color: #1e293b !important; }

        .terms-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            font-size: 9px;
            color: #94a3b8 !important;
            line-height: 1.4;
            padding-top: 4px;
        }

        .expandable {
            max-height: 0;
            overflow: hidden;
            transition: all 0.4s ease-in-out;
            opacity: 0;
        }
        .expandable.active {
            max-height: 500px;
            opacity: 1;
            margin-top: 0.75rem;
        }

        @media print {
            html, body { width: auto; max-width: none; overflow: visible; background: white !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; margin: 0 !important; padding: 0 !important; }
            body, .app-container, #view-main, #main-content { height: auto !important; overflow: visible !important; display: block !important; background: white !important; padding: 0 !important; margin: 0 !important; }
            #main-header, #bottom-nav, #login-screen, #email-bs-overlay, #confirm-bs-overlay, #info-bs-overlay, .no-print { display: none !important; }
            
            .invoice-wrapper { overflow: visible; padding: 0; display: block; height: auto !important; width: 100%; margin: 0; }
            .invoice-card { box-shadow: none !important; border: none !important; margin: 0 auto !important; width: 100% !important; padding: 40px !important; min-height: 99vh !important; transform: none !important; page-break-after: avoid; page-break-inside: avoid; }

            body.print-bs-mode #view-main, body.print-bs-mode #bottom-nav { display: none !important; }
            body.print-bs-mode #bs-overlay { display: block !important; opacity: 1 !important; position: static !important; background: white !important; }
            body.print-bs-mode #bs-content { box-shadow: none !important; transform: none !important; height: auto !important; position: static !important; background: white !important; }
            body.print-bs-mode #bs-drag-handle, body.print-bs-mode #bs-header { display: none !important; }
            body.print-bs-mode #bs-content .flex-1 { padding: 0 !important; background: white !important; overflow: visible !important; }
            
            @page { size: A4; margin: 0; }
        }
    </style>
</head>

<script>
    window.addEventListener("load", () => {
        lucide.createIcons();
        const splash = document.getElementById('splash-screen');
        if (splash) {
            setTimeout(() => {
                splash.style.opacity = '0';
                splash.style.transform = 'scale(1.05)';
                setTimeout(() => { splash.remove(); }, 1000);
            }, 2500);
        }
        setup3DCard();
    });

    function setup3DCard() {
        const container = document.getElementById('dev-card-container');
        const inner = document.getElementById('dev-card-inner');
        if (!container || !inner) return;

        let isDragging = false;
        let startX, startY, lastX, lastTime;
        let velocityX = 0, rotY = 0, rotX = 0;
        let targetRotY = 0, targetRotX = 0, baseRotY = 0;

        container.addEventListener('pointerdown', (e) => {
            isDragging = true; startX = e.clientX; startY = e.clientY;
            lastX = startX; lastTime = performance.now(); velocityX = 0;
            container.setPointerCapture(e.pointerId);
        });

        container.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            const deltaX = e.clientX - startX; const deltaY = e.clientY - startY;
            const now = performance.now(); const dt = now - lastTime;
            if (dt > 0) velocityX = (e.clientX - lastX) / dt;
            lastX = e.clientX; lastTime = now;

            targetRotY = baseRotY + (deltaX * 0.4); 
            targetRotX = -(deltaY * 0.15);
            targetRotX = Math.max(-15, Math.min(15, targetRotX));
        });

        const release = (e) => {
            if (!isDragging) return;
            isDragging = false;
            const deltaX = e.clientX - startX; const deltaY = e.clientY - startY;

            if (Math.abs(deltaX) < 5 && Math.abs(deltaY) < 5) {
                baseRotY += 180;
            } else {
                const diff = targetRotY - baseRotY;
                const velThreshold = 0.5; const distThreshold = 60;
                if (Math.abs(diff) > distThreshold || Math.abs(velocityX) > velThreshold) {
                    if (diff > 0 || velocityX > velThreshold) baseRotY += 180;
                    else baseRotY -= 180;
                }
            }
            targetRotY = baseRotY; targetRotX = 0; 
        };

        container.addEventListener('pointerup', release);
        container.addEventListener('pointercancel', release);

        function render() {
            rotY += (targetRotY - rotY) * 0.1;
            rotX += (targetRotX - rotX) * 0.1;
            inner.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
            requestAnimationFrame(render);
        }
        render();
    }
</script>

        });
    };

    window.loadCachedImages = () => { window.updateLogoTheme(); };
    window.loadCachedImages();

    window.cacheImages = async () => {
        const cacheImg = async (url, key) => {
            if (localStorage.getItem(key)) return;
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const reader = new FileReader();
                reader.onloadend = () => {
                    localStorage.setItem(key, reader.result);
                    window.loadCachedImages();
                };
                reader.readAsDataURL(blob);
            } catch (e) { console.log(`Could not cache ${url}`, e); }
        };
        cacheImg('gridlabs_logo.png', 'cached_gridlabs_logo');
    };

        document.getElementById('login-screen').style.display = 'none';

        document.getElementById('app-title').innerText = titles[savedTab] || 'Dashboard';
    }

        let sheetClosed = false;
        ['bs-overlay', 'info-bs-overlay', 'confirm-bs-overlay', 'email-bs-overlay'].forEach(id => {
            const el = document.getElementById(id);
            if (el && !el.classList.contains('opacity-0')) {
                if(id === 'bs-overlay') window.closeBottomSheet();
                else if(id === 'info-bs-overlay') window.closeInfoSheet();
                else if(id === 'confirm-bs-overlay') window.closeConfirmSheet();
                else if(id === 'email-bs-overlay') window.closeEmailLoginSheet();
                sheetClosed = true;
            }

        if (sheetClosed) { history.pushState(null, null, location.href); return; }
        if (window.currentUser && window.currentTab !== 'dashboard') {
            switchTab('dashboard'); history.pushState(null, null, location.href); return;
        }
    });
    history.pushState(null, null, location.href);

    const today = () => new Date().toISOString().split('T')[0];
    const fmt = n => '₹ ' + parseFloat(n).toLocaleString('en-IN');

    window.doAuth = async () => {
        const email = document.getElementById('auth-email').value.trim();
        const pass = document.getElementById('auth-pass').value.trim();
        const loginBtn = document.getElementById('btn-login');
        const originalHtml = `LOGIN`;

        if(!email || !pass) {
            loginBtn.innerHTML = 'ENTER DETAILS';
            loginBtn.classList.remove('bg-purple-600', 'hover:bg-purple-700');
            loginBtn.classList.add('bg-red-600', 'animate-shake');
            setTimeout(() => {
                loginBtn.innerHTML = originalHtml;
                loginBtn.classList.remove('bg-red-600', 'animate-shake');
                loginBtn.classList.add('bg-purple-600', 'hover:bg-purple-700');
            }, 1000);
            return;
        }

        loginBtn.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> AUTHENTICATING`;
        loginBtn.classList.add('opacity-90', 'pointer-events-none');

        try {
            await setPersistence(auth, browserLocalPersistence);
            await signInWithEmailAndPassword(auth, email, pass);
            window.closeEmailLoginSheet();
            loginBtn.innerHTML = originalHtml;
            loginBtn.classList.remove('opacity-90', 'pointer-events-none');
        } catch (error) {
            loginBtn.innerHTML = 'INVALID CREDENTIALS';
            loginBtn.classList.remove('bg-purple-600', 'hover:bg-purple-700');
            loginBtn.classList.add('bg-red-600', 'animate-shake');
            setTimeout(() => {
                loginBtn.innerHTML = originalHtml;
                loginBtn.classList.remove('bg-red-600', 'animate-shake', 'opacity-90', 'pointer-events-none');
                loginBtn.classList.add('bg-purple-600', 'hover:bg-purple-700');

    function showLoginScreen() {
        localStorage.removeItem('isLoggedIn'); localStorage.removeItem('currentTab');
        window.currentUser = null;
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('app').style.display = 'none';
    }

    function initAppForUser(user) {
        localStorage.setItem('isLoggedIn', 'true');
        window.currentUser = user;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        window.cacheImages();
        window.isProfileLoaded = false; window.isInvoicesLoaded = false;
        window.switchTab(window.currentTab);

        const profileRef = ref(database, `INVOYR/users/${user.uid}/profile`);
        onValue(profileRef, (snapshot) => {
            let p = snapshot.val();
            let needsUpdate = false;
            const fallbackName = user.displayName || (user.email ? user.email.split('@')[0].toUpperCase() : 'NEW USER');
            const now = Date.now(); const oneDayMs = 24 * 60 * 60 * 1000;

            if (!p) {
                p = { 
                    businessName: fallbackName + ' ENTERPRISES',
                    name: fallbackName, 
                    phone: '+91 00000 00000', 
                    upiId: 'yourupi@bank',
                    created_at: now,
                    expires_at: now + (365 * oneDayMs),
                    membership_days: 365 
                };
                needsUpdate = true;
            } else {
                if(!p.businessName) { p.businessName = fallbackName + ' ENTERPRISES'; needsUpdate = true; }
                if(!p.name) { p.name = fallbackName; needsUpdate = true; }
                if(!p.phone) { p.phone = '+91 00000 00000'; needsUpdate = true; }
                if(!p.upiId) { p.upiId = 'yourupi@bank'; needsUpdate = true; }
                if(!p.created_at) { p.created_at = now; needsUpdate = true; }
                if(!p.expires_at) { 
                    const oldMemDays = p.membership_days || 365;
                    p.expires_at = p.created_at + (oldMemDays * oneDayMs); 
                    needsUpdate = true; 
                }
                let daysLeft = Math.ceil((p.expires_at - now) / oneDayMs);
                if (daysLeft < 0) daysLeft = 0;
                if(p.membership_days !== daysLeft) {
                    p.membership_days = daysLeft; needsUpdate = true;
                }
            }
            if (needsUpdate) set(profileRef, p).catch(e => console.warn(e));
            window.appData.profile = p; window.isProfileLoaded = true; checkAndReRender();
        });

        const invoicesRef = ref(database, `INVOYR/users/${user.uid}/invoices`);
        onValue(invoicesRef, (snapshot) => {
            if (snapshot.exists()) {
                window.appData.invoices = Object.values(snapshot.val()).sort((a,b) => a.id.localeCompare(b.id));
            } else {
                window.appData.invoices = [];
            }
            window.isInvoicesLoaded = true; checkAndReRender();
        });
    }

    onAuthStateChanged(auth, (user) => {
        if (user) initAppForUser(user);
        else showLoginScreen();
    });

    function checkAndReRender() {
        if (window.isProfileLoaded && window.isInvoicesLoaded) {
            document.getElementById('main-content').innerHTML = renderPage(window.currentTab);
            lucide.createIcons();
            if (window.currentTab === 'add-invoice' || window.currentTab === 'view-invoice') {
                if(window.currentTab === 'add-invoice' && !window.isEditing) window.runInvoiceCalculation();
                setTimeout(window.applyInvoiceScaling, 50);
            }
        }
    }

    window.openNewInvoice = () => { window.isEditing = false; window.isSaved = false; window.switchTab('add-invoice'); }

        window.isProfileSimulatingLoad = true; window.switchTab('profile');
        setTimeout(() => {
            window.isProfileSimulatingLoad = false;
            if (window.currentTab === 'profile') {
                document.getElementById('main-content').innerHTML = renderPage('profile'); lucide.createIcons();

    window.switchTab = (tab) => {
        window.currentTab = tab; localStorage.setItem('currentTab', tab); window.isSaved = false;
        document.querySelectorAll('#bottom-nav button').forEach(b => b.classList.remove('text-purple-600', 'dark:text-purple-400'));

        const titles = { dashboard: 'Dashboard', profile: 'Settings', 'add-invoice': 'Create Invoice', 'view-invoice': 'Invoice Details' };
        document.getElementById('app-title').innerText = titles[tab] || 'GRIDLABS';

        document.getElementById('main-content').innerHTML = renderPage(tab); lucide.createIcons();

        if (window.isProfileLoaded && window.isInvoicesLoaded) {
            if (tab === 'add-invoice' && !window.isEditing) window.runInvoiceCalculation();

        document.querySelectorAll('.invoice-wrapper').forEach(wrapper => {
            const card = wrapper.querySelector('.invoice-card'); if (!card) return;

            drop.style.backgroundColor = ['#a855f7', '#3b82f6', '#10b981', '#f59e0b', '#ec4899'][Math.floor(Math.random()*5)];

    window.pendingConfirmAction = null;
    const setupSlider = () => {
        const thumb = document.getElementById('slide-thumb'); const fill = document.getElementById('slide-fill');
        const track = document.getElementById('slide-track'); const text = document.getElementById('slide-text');
        if(!thumb) return;
        let isDragging = false; let startX = 0;

        const handleStart = (e) => {
            isDragging = true; startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            thumb.style.transition = 'none'; fill.style.transition = 'none';
        };

        const handleMove = (e) => {
            if (!isDragging) return; e.preventDefault();
            const currentX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            let diff = currentX - startX; const maxTrack = track.clientWidth - thumb.clientWidth - 8;
            if (diff < 0) diff = 0; if (diff > maxTrack) diff = maxTrack;

            thumb.style.transform = `translateX(${diff}px)`; fill.style.width = `calc(${diff}px + 1.5rem)`;
            text.style.opacity = 1 - (diff / maxTrack);

            if (diff >= maxTrack * 0.90) {
                isDragging = false; thumb.style.transform = `translateX(${maxTrack}px)`;
                setTimeout(() => {
                    const actionToExecute = window.pendingConfirmAction; window.closeConfirmSheet();
                    if(actionToExecute) actionToExecute();
                }, 150);
            }
        };

        const handleEnd = () => {
            if (!isDragging) return; isDragging = false;
            thumb.style.transition = 'transform 0.3s cubic-bezier(0.16, 1, 0.3, 1)'; fill.style.transition = 'width 0.3s cubic-bezier(0.16, 1, 0.3, 1)';
            text.style.transition = 'opacity 0.3s ease';
            thumb.style.transform = `translateX(0px)`; fill.style.width = '0px'; text.style.opacity = '1';
        };

        thumb.addEventListener('touchstart', handleStart, {passive: false}); document.addEventListener('touchmove', handleMove, {passive: false}); document.addEventListener('touchend', handleEnd);
        thumb.addEventListener('mousedown', handleStart); document.addEventListener('mousemove', handleMove); document.addEventListener('mouseup', handleEnd);
    };
    setupSlider();

    window.openConfirmSheet = (title, msg, isDestructive, actionFn) => {
        window.pendingConfirmAction = actionFn;
        document.getElementById('confirm-title').innerText = title; document.getElementById('confirm-message').innerText = msg;
        const iconBox = document.getElementById('confirm-icon-box'); const thumb = document.getElementById('slide-thumb'); const fill = document.getElementById('slide-fill');

        if (isDestructive) {
            iconBox.className = "w-16 h-16 bg-red-100 dark:bg-red-900/30 text-red-600 rounded-[5px] flex items-center justify-center mb-4";
            iconBox.innerHTML = '<i data-lucide="alert-triangle" class="w-8 h-8"></i>';
            thumb.className = "absolute left-1 w-12 h-12 bg-white dark:bg-slate-700 rounded-[5px] shadow-md flex items-center justify-center z-10 cursor-grab text-red-500 active:cursor-grabbing transition-none border border-slate-200 dark:border-slate-600";
            fill.className = "absolute left-0 top-0 h-full bg-red-500/10 dark:bg-red-500/20 w-0 z-0 transition-none";
        } else {
            iconBox.className = "w-16 h-16 bg-purple-100 dark:bg-purple-900/30 text-purple-600 rounded-[5px] flex items-center justify-center mb-4";
            iconBox.innerHTML = '<i data-lucide="log-out" class="w-8 h-8"></i>';
            thumb.className = "absolute left-1 w-12 h-12 bg-white dark:bg-slate-700 rounded-[5px] shadow-md flex items-center justify-center z-10 cursor-grab text-purple-500 active:cursor-grabbing transition-none border border-slate-200 dark:border-slate-600";
            fill.className = "absolute left-0 top-0 h-full bg-purple-500/10 dark:bg-purple-500/20 w-0 z-0 transition-none";
        }
        lucide.createIcons();

        thumb.style.transition = 'none'; fill.style.transition = 'none';
        thumb.style.transform = `translateX(0px)`; fill.style.width = '0px'; document.getElementById('slide-text').style.opacity = '1';

        const overlay = document.getElementById('confirm-bs-overlay'); const content = document.getElementById('confirm-bs-content');
        overlay.classList.remove('opacity-0', 'pointer-events-none'); overlay.classList.add('opacity-100');
        content.classList.remove('translate-y-full'); content.classList.add('translate-y-0');
        history.pushState(null, null, location.href);
    };

    window.closeConfirmSheet = () => {
        window.pendingConfirmAction = null;
        const overlay = document.getElementById('confirm-bs-overlay'); const content = document.getElementById('confirm-bs-content');
        if(!overlay.classList.contains('opacity-0')) {
             content.classList.remove('translate-y-0'); content.classList.add('translate-y-full');
             overlay.classList.remove('opacity-100'); overlay.classList.add('opacity-0');
             setTimeout(() => overlay.classList.add('pointer-events-none'), 300);
        }
    };

    window.viewInvoice = (id) => {
        window.viewingInvoiceId = id; localStorage.setItem('viewingInvoiceId', id);
        window.isInvoiceSimulatingLoad = true; window.switchTab('view-invoice');
        setTimeout(() => {
            window.isInvoiceSimulatingLoad = false;
            if(window.currentTab === 'view-invoice') window.switchTab('view-invoice');
        }, 1000);
    }

    window.editInvoice = (id) => {
        const inv = window.appData.invoices.find(i => i.id === id); if(!inv) return;
        window.isEditing = true; window.switchTab('add-invoice');

        setTimeout(() => {
            document.getElementById('iClient').value = inv.client || '';
            document.getElementById('iClientPhone').value = inv.clientPhone || '';
            document.getElementById('iInvNum').value = inv.id;
            document.getElementById('iDate').value = (inv.date && inv.date.includes('/')) ? inv.date.split('/').reverse().join('-') : (inv.date || today());
            document.getElementById('iProjName').value = inv.projName || '';
            document.getElementById('iTotalCost').value = inv.totalCost || 0;
            document.getElementById('iAdvance').value = inv.advance || 0;
            
            document.getElementById('emiToggle').checked = inv.isEmi || false;
            document.getElementById('amcToggle').checked = inv.isAmc || false;
            window.toggleSection('emi-fields', document.getElementById('emiToggle'));
            window.toggleSection('amc-fields', document.getElementById('amcToggle'));

            document.getElementById('iTenure').value = inv.tenure || 1;
            document.getElementById('iEmiStart').value = (inv.emiStart && inv.emiStart.includes('/')) ? inv.emiStart.split('/').reverse().join('-') : (inv.emiStart || today());
            document.getElementById('iEmiNext').value = (inv.emiNext && inv.emiNext.includes('/')) ? inv.emiNext.split('/').reverse().join('-') : (inv.emiNext || today());
            document.getElementById('iYearly').value = inv.yearly || 0;
            
            window.runInvoiceCalculation();
        }, 100);
    }

    window.deleteInvoice = (id) => {
        if(!window.currentUser) return;
        window.openConfirmSheet("Delete Invoice", "Are you sure you want to delete this invoice? This action cannot be undone.", true,
            () => {
                set(ref(database, `INVOYR/users/${window.currentUser.uid}/invoices/${id}`), null)
                    .then(() => window.switchTab('dashboard'))
                    .catch((err) => { alert("Failed to delete the invoice."); console.error(err); });
            }
        );
    }

    window.logoutUser = () => {
        window.openConfirmSheet("Sign Out", "Are you sure you want to sign out?", false, () => { signOut(auth); });
    };

    // GENERATE GRIDLABS INVOICE FORMAT
    function generateInvoiceCardHTML(data, profile) {
        const remaining = (data.totalCost || 0) - (data.advance || 0);
        const monthlyEmi = data.tenure ? Math.round(remaining / data.tenure) : 0;
        const logoSrc = localStorage.getItem('cached_gridlabs_logo') || 'gridlabs_logo.png';

        let totalCards = 3;
        if (data.isEmi) totalCards += 2; if (data.isAmc) totalCards += 1;
        const gridClass = totalCards === 4 ? 'grid-cols-2' : 'grid-cols-3';
        
        const brandName = profile.businessName || 'GRIDLABS PROD.';
        const ownerName = profile.name || 'Owner Name';
        const ownerPhone = profile.phone || 'Phone Number';
        const upi = profile.upiId || 'YOURUPI@BANK';

        let qrHtml = '';
        if (upi && upi.trim() !== '' && upi.toLowerCase() !== 'yourupi@bank') {
            let upiString = `upi://pay?pa=${upi.trim()}&pn=${ownerName}&cu=INR`;
            if (remaining > 0) {
                upiString += `&am=${Math.round(remaining)}`;
            }
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(upiString)}&margin=0`;
            qrHtml = `
                <img src="${qrUrl}" alt="UPI QR Code" class="w-32 h-32 rounded-[5px] mix-blend-darken border border-slate-200 p-1 bg-white" crossorigin="anonymous" />
            `;
        }

        return `
            <div class="invoice-card" id="printable-invoice">
                <div class="flex justify-between items-start border-b-4 border-slate-900 pb-10 mb-10">
                    <div class="flex items-center gap-3">
                        <img src="${logoSrc}" alt="Logo" class="h-20 w-auto object-contain" onerror="this.style.display='none'">
                        <div>
                            <h1 class="text-4xl font-bold text-slate-900 leading-none tracking-tighter">GRIDLABS PROD.</h1>
                            <p class="text-[12px] text-blue-600 tracking-[0.4em] font-bold mt-2">GROWS DIGITAL BRANDINGS</p>
                        </div>
                    </div>
                    <div class="flex-shrink-0">
                        ${qrHtml}
                    </div>
                </div>

                <div class="flex justify-between mb-8">
                    <div class="w-1/2">
                        <p class="text-blue-600 font-bold text-[12px] mb-3 tracking-[0.2em]">CLIENT INFORMATION</p>
                        <h3 class="text-xl font-bold text-slate-900">${data.client || 'GUEST CLIENT'}</h3>
                        <p class="text-[14px] text-slate-500 font-bold mt-1">PHONE: ${data.clientPhone || 'N/A'}</p>
                        <p class="text-[14px] text-slate-500 font-bold mt-1">ISSUED ON: ${data.date || 'N/A'}</p>
                        <p class="text-[14px] text-slate-800 font-black mt-2 tracking-widest">INV NO: ${data.id || '000'}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-slate-400 font-bold text-[12px] mb-3 tracking-[0.2em]">SERVICE PROVIDER</p>
                        <h3 class="text-xl font-bold text-slate-900 uppercase">${brandName}</h3>
                        <p class="text-[14px] text-slate-500 font-bold mt-1">PHONE: ${ownerPhone}</p>
                        <p class="text-[14px] text-slate-500 font-bold mt-1">UPI : ${upi}</p>
                    </div>
                </div>

                <table class="table-custom">
                    <thead>
                        <tr>
                            <th style="width: 70%;">SERVICE DESCRIPTION</th>
                            <th style="text-align: right;">TOTAL</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>
                                <span class="font-bold text-slate-900 text-lg">${data.projName || 'PROJECT SERVICE'}</span><br>
                                <span class="text-[11px] text-slate-400 font-bold tracking-widest mt-2 inline-block">
                                    ${data.isEmi ? 'PAYMENT TYPE: EMI PLAN' : 'PAYMENT TYPE: STANDARD FULL PROJECT'}
                                </span>
                            </td>
                            <td style="text-align: right;" class="font-bold text-slate-900 text-2xl">₹${(data.totalCost || 0).toLocaleString('en-IN')}</td>
                        </tr>
                    </tbody>
                </table>

                <div class="mt-8 grid ${gridClass} gap-4">
                    <div class="p-5 border border-slate-200 rounded-md bg-slate-50">
                        <p class="text-[11px] font-bold text-slate-400 mb-1 tracking-widest">TOTAL COST</p>
                        <h4 class="text-2xl font-bold text-slate-800">₹${(data.totalCost || 0).toLocaleString('en-IN')}</h4>
                    </div>
                    <div class="p-5 border border-slate-200 rounded-md bg-slate-50">
                        <p class="text-[11px] font-bold text-slate-400 mb-1 tracking-widest">TOTAL PAID</p>
                        <h4 class="text-2xl font-bold text-green-600">₹${(data.advance || 0).toLocaleString('en-IN')}</h4>
                    </div>
                    <div class="p-5 border border-slate-200 rounded-md bg-slate-50">
                        <p class="text-[11px] font-bold text-slate-400 mb-1 tracking-widest">OUTSTANDING</p>
                        <h4 class="text-2xl font-bold text-red-500">₹${Math.round(remaining).toLocaleString('en-IN')}</h4>
                    </div>
                    ${data.isEmi ? `
                    <div class="p-5 border border-slate-200 rounded-md bg-slate-50">
                        <p class="text-[11px] font-bold text-slate-400 mb-1 tracking-widest">EMI TENURE</p>
                        <h4 class="text-2xl font-bold text-slate-800">${data.tenure || 0} MONTHS</h4>
                    </div>
                    <div class="p-5 border border-slate-200 rounded-md bg-slate-50">
                        <p class="text-[11px] font-bold text-slate-400 mb-1 tracking-widest">MONTHLY EMI</p>
                        <h4 class="text-2xl font-bold text-slate-800">₹${monthlyEmi.toLocaleString('en-IN')}</h4>
                        <p class="text-[10px] font-bold text-blue-600 mt-2 tracking-widest">NEXT DUE: ${data.emiNext}</p>
                    </div>
                    ` : ''}
                    ${data.isAmc ? `
                    <div class="p-5 border border-blue-200 rounded-md bg-blue-50/50">
                        <p class="text-[11px] font-bold text-blue-400 mb-1 tracking-widest">ANNUAL AMC</p>
                        <h4 class="text-2xl font-bold text-blue-700">₹${(data.yearly || 0).toLocaleString('en-IN')}</h4>
                    </div>
                    ` : ''}
                </div>

                <div class="mt-8">
                    <p class="text-[12px] font-bold text-slate-900 mb-1 tracking-widest border-b border-slate-200 pb-1">UNIVERSAL TERMS & CONDITIONS</p>
                    <div class="terms-grid">
                        <div>
                            <strong>1. PAYMENT & VALIDITY:</strong> All milestone payments are non-refundable. Invoices must be cleared within 7 days of the due date. A late fee of 2% per month applies to overdue balances.
                            <br><br>
                            <strong>2. INTELLECTUAL PROPERTY:</strong> Full ownership and source code rights are transferred to the client only upon 100% completion of all financial dues. We retain the right to showcase the work in portfolios.
                        </div>
                        <div>
                            <strong>3. PROJECT SCOPE:</strong> Any modifications outside the initial scope mentioned in this invoice will be billed as additional work at standard hourly rates.
                            <br><br>
                            <strong>4. TERMINATION:</strong> Either party may terminate the contract with 15 days written notice. Client is liable to pay for all work completed up to the date of termination.
                        </div>
                    </div>
                </div>

                <div class="mt-auto pt-10 flex justify-between items-end">
                    <div class="flex flex-col justify-end">
                        <div class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                            COMPUTER GENERATED INVOICE<br>NO PHYSICAL SIGNATURE REQUIRED
                        </div>
                    </div>
                    <div class="text-center">
                        <div class="text-xl text-blue-700 font-bold" style="letter-spacing: 2px;">${ownerName}</div>
                        <div class="w-56 h-[2px] bg-slate-900 mb-2 mt-1 mx-auto"></div>
                        <p class="text-[11px] font-bold text-slate-900 tracking-widest">AUTHORIZED SIGNATORY</p>
                    </div>
                </div>
            </div>
        `;
    }

    function renderPage(tab) {

        const profile = window.appData.profile;

                return `

                    <div class="stat-card glass-card rounded-[5px] flex flex-col justify-center py-4 h-[88px]"><p class="font-bold text-slate-500 text-[11px] truncate">TOTAL REVENUE</p><div class="shimmer-box h-7 w-24 mt-1"></div></div>

                    <div class="glass-card p-4 rounded-[5px] flex justify-between items-center"><div class="flex-1"><div class="shimmer-box h-5 w-3/4 mb-2"></div><div class="shimmer-box h-3 w-1/2"></div></div><div class="shimmer-box h-6 w-20"></div></div>
                    <div class="glass-card p-4 rounded-[5px] flex justify-between items-center"><div class="flex-1"><div class="shimmer-box h-5 w-2/3 mb-2"></div><div class="shimmer-box h-3 w-1/3"></div></div><div class="shimmer-box h-6 w-20"></div></div>

                        <p class="font-bold text-slate-500 text-[11px] truncate">TOTAL INVOICES</p>

                            <i data-lucide="sparkles" class="w-5 h-5 text-emerald-500"></i>
                        </div>
                    </div>

                <div class="space-y-3 pb-4">`;
                [...invoices].reverse().forEach(inv => {
                    const shortClient = inv.client ? inv.client.trim().split(/\s+/).slice(0, 2).join(' ') : 'CLIENT';

                    html += `
                    <div onclick="viewInvoice('${inv.id}')" class="glass-card p-4 rounded-[5px] flex justify-between items-end gap-2 cursor-pointer hover:border-purple-400 transition-colors">

                        </div>
                    </div>`;
                });
                html += `</div>`;
            }
            return html;
        }

        if (tab === 'view-invoice') {
            if (!isLoaded || window.isInvoiceSimulatingLoad) {
                return `
                <div class="flex items-center justify-between mb-4 gap-2">
                    <div class="shimmer-box h-9 w-12 rounded-[5px]"></div>
                    <div class="shimmer-box h-9 w-32 rounded-[5px]"></div>
                </div>
                <div class="invoice-wrapper"><div class="shimmer-box w-[1000px] h-[1123px] max-w-full rounded-[5px]"></div></div>`;
            }

            if(!inv) return `<div class="text-center p-10 font-bold text-red-500">Invoice Not Found.</div>`;

        if (tab === 'profile') {

                        <div class="w-20 h-20 mx-auto bg-slate-100 dark:bg-slate-800 rounded-[5px] border-[3px] border-slate-200 dark:border-slate-700 overflow-hidden mb-3">
                            <img src="${avatarUrl}" class="w-full h-full object-contain" onerror="this.style.display='none'">

                        <h2 class="font-black text-base uppercase truncate">${profile.businessName || profile.name || 'Settings'}</h2>
                        <p class="text-xs text-slate-500 font-bold">${window.currentUser?.email}</p>

                    <div>
                        <label class="text-[11px] font-bold text-slate-500 uppercase mb-1 ml-1 block">Client Name</label>
                        <input type="text" id="iClient" value="" placeholder="e.g. MUKEJA MAKHANA" oninput="runInvoiceCalculation()" class="field-input mb-3">
                        <label class="text-[11px] font-bold text-slate-500 uppercase mb-1 ml-1 block">Phone No.</label>
                        <input type="text" id="iClientPhone" value="" placeholder="+91 00000 00000" oninput="runInvoiceCalculation()" class="field-input">
                    </div>
                    <div>
                        <div class="grid grid-cols-2 gap-3 mb-3">
                            <div><label class="text-[11px] font-bold text-slate-500 uppercase mb-1 ml-1 block">Inv No.</label><input type="text" id="iInvNum" value="${window.isEditing ? '...' : nextId}" oninput="runInvoiceCalculation()" class="field-input" ${window.isEditing ? 'disabled style="opacity:0.6"' : ''}></div>
                            <div><label class="text-[11px] font-bold text-slate-500 uppercase mb-1 ml-1 block">Date</label><input type="date" id="iDate" value="${today()}" oninput="runInvoiceCalculation()" class="field-input"></div>
                        </div>
                        <label class="text-[11px] font-bold text-slate-500 uppercase mb-1 ml-1 block">Project Scope</label>
                        <input type="text" id="iProjName" value="" placeholder="e.g. SEO SERVICES" oninput="runInvoiceCalculation()" class="field-input">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">
                    <div class="bg-white dark:bg-slate-800 p-4 rounded-[5px] border border-slate-200 dark:border-slate-700"><label class="text-[11px] font-bold text-slate-500 uppercase mb-1 ml-1 block">Total Project Cost (₹)</label><input type="number" id="iTotalCost" value="0" oninput="runInvoiceCalculation()" class="field-input"></div>
                    <div class="bg-white dark:bg-slate-800 p-4 rounded-[5px] border border-slate-200 dark:border-slate-700"><label class="text-[11px] font-bold text-slate-500 uppercase mb-1 ml-1 block">Advance Received (₹)</label><input type="number" id="iAdvance" value="0" oninput="runInvoiceCalculation()" class="field-input"></div>
                </div>

                <div class="flex flex-row gap-4 mb-2">
                    <div class="flex-1 flex items-center gap-3 p-4 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-[5px] cursor-pointer">
                        <input type="checkbox" id="emiToggle" onchange="toggleSection('emi-fields', this); runInvoiceCalculation()" class="w-5 h-5 accent-purple-600 cursor-pointer">
                        <label for="emiToggle" class="text-[11px] font-bold text-slate-700 dark:text-slate-300 cursor-pointer uppercase">ACTIVATE EMI CYCLE</label>
                    </div>
                    <div class="flex-1 flex items-center gap-3 p-4 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-[5px] cursor-pointer">
                        <input type="checkbox" id="amcToggle" onchange="toggleSection('amc-fields', this); runInvoiceCalculation()" class="w-5 h-5 accent-purple-600 cursor-pointer" checked>
                        <label for="amcToggle" class="text-[11px] font-bold text-slate-700 dark:text-slate-300 cursor-pointer uppercase">SHOW AMC DETAILS</label>
                    </div>
                </div>

                <div id="emi-fields" class="expandable w-full">
                    <div class="grid grid-cols-3 gap-3 p-4 bg-purple-50 dark:bg-purple-900/10 border border-purple-100 dark:border-purple-900/30 rounded-[5px]">
                        <div><label class="text-[11px] font-bold text-purple-600 dark:text-purple-400 uppercase block mb-1">Tenure (Mo)</label><input type="number" id="iTenure" value="4" oninput="runInvoiceCalculation()" class="field-input"></div>
                        <div><label class="text-[11px] font-bold text-purple-600 dark:text-purple-400 uppercase block mb-1">Start Date</label><input type="date" id="iEmiStart" value="${today()}" oninput="runInvoiceCalculation()" class="field-input"></div>
                        <div><label class="text-[11px] font-bold text-purple-600 dark:text-purple-400 uppercase block mb-1">Next Due</label><input type="date" id="iEmiNext" value="${today()}" oninput="runInvoiceCalculation()" class="field-input"></div>
                    </div>
                </div>

                <div id="amc-fields" class="expandable active w-full mb-6">
                    <div class="p-4 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-[5px]">
                        <label class="text-[11px] font-bold text-slate-500 uppercase block mb-1">Recurring AMC Charge (₹/Year)</label>
                        <input type="number" id="iYearly" value="0" oninput="runInvoiceCalculation()" class="field-input">
                    </div>
                </div>

                <div class="flex gap-3 mt-4">
                    <button id="save-btn" onclick="saveAndPrintInvoice()" class="flex-1 btn-primary bg-purple-600 text-white flex items-center justify-center hover:bg-purple-700 shadow-md transition-all tracking-wide">
                        ${window.isEditing ? 'UPDATE RECORD' : 'SAVE RECORD'}
                    </button>
                    <button onclick="window.openBottomSheet()" class="px-5 btn-primary bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 flex items-center justify-center border border-slate-200 dark:border-slate-700 shadow-sm" title="Live Preview">
                        <i data-lucide="eye" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>`;
        }

        return '';
    }

    window.toggleSection = (id, checkbox) => {
        const el = document.getElementById(id);
        if(!el) return;
        checkbox.checked ? el.classList.add('active') : el.classList.remove('active');
    }

    window.saveProfile = () => {
        if (!window.currentUser) return;
        const p = { 
            ...window.appData.profile, 
            businessName: document.getElementById('p-bizname').value || 'GRIDLABS PROD.',
            name: document.getElementById('p-name').value, 
            phone: document.getElementById('p-phone').value,
            upiId: document.getElementById('p-upi').value
        };
        window.appData.profile = p;
        set(ref(database, `INVOYR/users/${window.currentUser.uid}/profile`), p);
    }

    window.runInvoiceCalculation = () => {
        if(!window.isProfileLoaded || !window.isInvoicesLoaded) return;

        if (window.isSaved) {
            window.isSaved = false;
            const btn = document.getElementById('save-btn');
            if (btn) {
                btn.innerHTML = window.isEditing ? 'UPDATE RECORD' : 'SAVE RECORD';
                btn.classList.remove('bg-emerald-600', 'pointer-events-none', 'opacity-90');
                btn.classList.add('bg-purple-600', 'hover:bg-purple-700');
                btn.disabled = false;
            }
        }

        let invNum = document.getElementById('iInvNum').value;
        if(!window.isEditing && (!invNum || invNum === '...')) {
             let maxNum = 0;
             window.appData.invoices.forEach(i => {
                const match = i.id.match(/INV-(\d+)/);
                if(match) {
                    const num = parseInt(match[1]);
                    if(num > maxNum) maxNum = num;
                }
             });
             invNum = 'INV-' + String(maxNum + 1).padStart(3, '0');
             document.getElementById('iInvNum').value = invNum;
        }

        const isEmi = document.getElementById('emiToggle').checked;
        const isAmc = document.getElementById('amcToggle').checked;
        
        const dateRaw = document.getElementById('iDate').value;
        const emiStartRaw = document.getElementById('iEmiStart').value;
        const emiNextRaw = document.getElementById('iEmiNext').value;

        const liveInv = {
            id: invNum,
            client: document.getElementById('iClient').value || 'GUEST CLIENT',
            clientPhone: document.getElementById('iClientPhone').value || 'N/A',
            date: dateRaw.includes('-') ? dateRaw.split('-').reverse().join('/') : dateRaw,
            projName: document.getElementById('iProjName').value || 'PROJECT SERVICE',
            totalCost: parseFloat(document.getElementById('iTotalCost').value) || 0,
            advance: parseFloat(document.getElementById('iAdvance').value) || 0,
            yearly: parseFloat(document.getElementById('iYearly').value) || 0,
            isEmi: isEmi,
            isAmc: isAmc,
            tenure: parseInt(document.getElementById('iTenure').value) || 1,
            emiStart: emiStartRaw.includes('-') ? emiStartRaw.split('-').reverse().join('/') : emiStartRaw,
            emiNext: emiNextRaw.includes('-') ? emiNextRaw.split('-').reverse().join('/') : emiNextRaw
        };

        const container = document.getElementById('bs-invoice-inner');
        if(container) {
            container.innerHTML = generateInvoiceCardHTML(liveInv, window.appData.profile);
            lucide.createIcons();
        }
    }

    window.saveAndPrintInvoice = () => {
        if(!window.currentUser) return alert("You must be logged in to save.");

        const invNum = document.getElementById('iInvNum').value;
        const isEmi = document.getElementById('emiToggle').checked;
        const isAmc = document.getElementById('amcToggle').checked;
        
        const dateRaw = document.getElementById('iDate').value;
        const emiStartRaw = document.getElementById('iEmiStart').value;
        const emiNextRaw = document.getElementById('iEmiNext').value;

        const invoiceData = {
            id: invNum,
            client: document.getElementById('iClient').value || 'GUEST CLIENT',
            clientPhone: document.getElementById('iClientPhone').value || 'N/A',
            date: dateRaw.includes('-') ? dateRaw.split('-').reverse().join('/') : dateRaw,
            projName: document.getElementById('iProjName').value || 'PROJECT SERVICE',
            totalCost: parseFloat(document.getElementById('iTotalCost').value) || 0,
            advance: parseFloat(document.getElementById('iAdvance').value) || 0,
            yearly: parseFloat(document.getElementById('iYearly').value) || 0,
            isEmi: isEmi,
            isAmc: isAmc,
            tenure: parseInt(document.getElementById('iTenure').value) || 1,
            emiStart: emiStartRaw.includes('-') ? emiStartRaw.split('-').reverse().join('/') : emiStartRaw,
            emiNext: emiNextRaw.includes('-') ? emiNextRaw.split('-').reverse().join('/') : emiNextRaw,
            createdAt: new Date().toISOString()
        };

        const isDuplicate = window.appData.invoices.some(inv =>
            inv.client === invoiceData.client &&
            inv.projName === invoiceData.projName &&
            inv.date === invoiceData.date &&
            inv.totalCost == invoiceData.totalCost &&
            inv.advance == invoiceData.advance &&
            inv.isEmi == invoiceData.isEmi &&
            inv.isAmc == invoiceData.isAmc &&
            inv.id !== invoiceData.id
        );

        if (isDuplicate) {
            alert("An invoice with these exact details already exists! Duplicates are not allowed.");
            return;
        }

        const markAsSaved = () => {
            window.isEditing = true; window.isSaved = true;
            const btn = document.getElementById('save-btn');
            if(btn) {
                btn.innerHTML = `GENERATED SUCCESSFULLY`;
                btn.classList.remove('bg-purple-600', 'hover:bg-purple-700');
                btn.classList.add('bg-emerald-600', 'pointer-events-none', 'opacity-90');
                btn.disabled = true;
            }
            window.fireRain();
        };

        set(ref(database, `INVOYR/users/${window.currentUser.uid}/invoices/${invNum}`), invoiceData).then(() => {
            markAsSaved();
        }).catch((err) => {
            console.error("Save Error:", err);
            alert("Failed to save invoice.");
        });
    }
</script>
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('Service Worker registered!', reg))
                .catch(err => console.error('Service Worker registration failed: ', err));
        });
    }
</script>
</body>
</html>
